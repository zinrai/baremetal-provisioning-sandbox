---
apt_hashicorp_repository:
  # The /gpg endpoint serves an ASCII-armored key, so the keyring is .asc (apt
  # reads an armored signed-by keyring directly); a .gpg name implies the
  # dearmored binary form and fails to verify.
  keyring: "/usr/share/keyrings/hashicorp-archive-keyring.asc"
  key_url: "https://apt.releases.hashicorp.com/gpg"
  repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.asc] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
