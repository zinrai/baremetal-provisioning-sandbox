---
# Places metal-bootstrap's config (which artifacts to fetch). Running
# metal-bootstrap is a procedure, not configuration, so it lives in the
# runbook (README "Prepare boot artifacts"), not here.
- name: Ensure metal-bootstrap config directory exists
  ansible.builtin.file:
    path: "{{ metal_bootstrap_conf.config | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - metal_bootstrap_conf

- name: Ensure metal-bootstrap config is present
  ansible.builtin.copy:
    src: "config.yaml"
    dest: "{{ metal_bootstrap_conf.config }}"
    owner: root
    group: root
    mode: "0644"
  tags:
    - metal_bootstrap_conf
